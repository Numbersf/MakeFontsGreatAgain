name: Build recolor_glyph

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'tools/recolor_glyph.c'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install NDK
      run: |
        set -e
        sudo apt update
        sudo apt install -y unzip wget
        wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
        unzip -q android-ndk-r26d-linux.zip
        ls -lh
        ls android-ndk-r26d

    - name: Build
      run: |
        set -e

        export NDK=$PWD/android-ndk-r26d
        TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

        echo "Using toolchain at: $TOOLCHAIN"
        ls $TOOLCHAIN | head

        $TOOLCHAIN/aarch64-linux-android21-clang tools/recolor_glyph.c -O2 -s -o recolor_glyph_arm64
        $TOOLCHAIN/armv7a-linux-androideabi21-clang tools/recolor_glyph.c -O2 -s -o recolor_glyph_arm
        $TOOLCHAIN/x86_64-linux-android21-clang tools/recolor_glyph.c -O2 -s -o recolor_glyph_x86_64
        $TOOLCHAIN/i686-linux-android21-clang tools/recolor_glyph.c -O2 -s -o recolor_glyph_x86

        echo "=== FILE TYPE CHECK ==="
        file recolor_glyph_arm64
        file recolor_glyph_arm
        file recolor_glyph_x86_64
        file recolor_glyph_x86

        echo "=== SIZE CHECK ==="
        ls -lh recolor_glyph_*

        mkdir -p out/bin
        mv recolor_glyph_* out/bin/

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: recolor_glyph_bin
        path: out/bin/